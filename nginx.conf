server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Image uploads (blob POSTs) proxy through here — allow generous bodies.
    client_max_body_size 30m;

    # gzip text assets on the fly.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # API → Bun backend, same-origin so the session cookie just works. Docker's embedded
    # DNS (127.0.0.11) + a variable upstream defer resolution so nginx starts even if the
    # api container isn't up yet and survives its restarts.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://api:3000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker + manifest must never be cached, or updates never ship.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — every unknown route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
